<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">UModel Tools Next icon</title>
  <desc id="desc">A stylized 3D viewport with an imported Unreal map grid and shader node links.</desc>
  <defs>
