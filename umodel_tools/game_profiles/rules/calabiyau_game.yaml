name: CalabiyauGame
description: Creator preference rules for CalabiyauGame material texture names.

texture_rules:
  - name: diffuse
    diffuse: true
    match:
      param_names:
        - basecolor_low
        - blend base
        - blendbase
        - main texture
        - main tex
        - maintex
        - maintexture
        - surface tex
        - surface texture
        - surfacetex
        - inside tex
        - inside texture
        - insidetex
        - crystal content tex
        - crystalcontenttex
        - matcap tex
        - matcaptex
        - content texture
        - contenttexture
        - jingti map
        - jingti_map
        - cloud tex
        - cloudtex
        - cloud texture
        - cloudtexture
      suffixes:
        - d2
    connections:
      - from: image.Color
        to: ao_mix.Color1
      - from: image.Alpha
        to: bsdf.Alpha

  - name: normal
    match:
      param_names:
        - normalmapa
        - normalmapb
      suffixes: []
    nodes:
      split: ShaderNodeSeparateColor
      invert_green: ShaderNodeInvert
      combine: ShaderNodeCombineColor
      normal_map: ShaderNodeNormalMap
    connections:
      - from: image.Color
        to: split.Color
      - from: split.Red
        to: combine.Red
      - from: split.Green
        to: invert_green.Color
      - from: invert_green.Color
        to: combine.Green
      - from: split.Blue
        to: combine.Blue
      - from: combine.Color
        to: normal_map.Color
      - from: normal_map.Normal
        to: bsdf.Normal

  - name: orm
    prefer_suffix: true
    match:
      param_names:
        - blend_ao_r_m_mask
        - blend ao r m mask
      suffixes:
        - blend_ao_r_m_mask
    nodes:
      split: ShaderNodeSeparateColor
    connections:
      - from: split.Red
        to: ao_mix.Color2
      - from: split.Green
        to: bsdf.Roughness
      - from: split.Blue
        to: bsdf.Metallic
      - from: image.Color
        to: split.Color

  - name: rmo
    prefer_suffix: true
    match:
      param_names:
        - rmo
        - ao roughness metallic height
        - aoroughnessmetallicheight
        - roughness metallic occlusion
        - roughnessmetallicocclusion
        - roughness metalness occlusion
        - roughnessmetalnessocclusion
      suffixes:
        - rmo
        - roughnessmetallicocclusion
    nodes:
      split: ShaderNodeSeparateColor
      displacement: ShaderNodeDisplacement
    connections:
      - from: split.Red
        to: ao_mix.Color2
      - from: split.Green
        to: bsdf.Roughness
      - from: split.Blue
        to: bsdf.Metallic
      - from: image.Color
        to: split.Color
      - from: displacement.Displacement
        to: output.Displacement
      - from: image.Alpha
        to: displacement.Height

  - name: alpha_mask
    match:
      param_names:
        - alphamaska_tex
        - alphamaskb_tex
        - dissolve map
        - dissolvemap
        - dissolve mask
        - dissolvemask
        - dissolve tex
        - dissolvetex
        - noise tex
        - noise texture
        - noisetex
        - main tex uv noise tex
        - maintexuvnoise_tex
        - vertex noise
        - t-noise_wall
        - t-noise_wallmask
        - maskrg
        - edge highlight mask
        - edgehighlightmask
        - alpha mask a
        - shazi
      suffixes:
        - m
        - maska
        - maskb
    nodes:
      transparent: ShaderNodeBsdfTransparent
      mix_shader: ShaderNodeMixShader
      split: ShaderNodeSeparateColor
    connections:
      - from: image.Color
        to: split.Color
      - from: split.Red
        to: mix_shader.Fac
      - from: transparent.BSDF
        to: mix_shader.Shader
      - from: bsdf.BSDF
        to: mix_shader.Shader_001
      - from: mix_shader.Shader
        to: output.Surface

  - name: emissive
    prefer_suffix: true
    match:
      param_names:
        - led tex
        - t_ledtex
      suffixes: []
    nodes:
      emission: ShaderNodeEmission
      add_shader: ShaderNodeAddShader
    connections:
      - from: image.Color
        to: emission.Color
      - from: bsdf.BSDF
        to: add_shader.Shader
      - from: emission.Emission
        to: add_shader.Shader_001
      - from: add_shader.Shader
        to: output.Surface
