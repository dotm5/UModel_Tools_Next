name = "CalabiyauGame"
description = "Creator preference rules for CalabiyauGame material texture names."

[[texture_rules]]
name = "diffuse"
diffuse = true
[texture_rules.match]
param_names = ["basecolor_low", "blend base", "blendbase", "pm_diffuse", "pm diffuse", "main texture", "main tex", "maintex", "maintexture", "surface tex", "surface texture", "surfacetex", "inside tex", "inside texture", "insidetex", "crystal content tex", "crystalcontenttex", "matcap tex", "matcaptex", "content texture", "contenttexture", "jingti map", "jingti_map", "cloud tex", "cloudtex", "cloud texture", "cloudtexture"]
suffixes = ["d2"]
[[texture_rules.connections]]
from = "image.Color"
to = "ao_mix.Color1"
[[texture_rules.connections]]
from = "image.Alpha"
to = "bsdf.Alpha"

[[texture_rules]]
name = "normal"
node_groups = ["directx_normal_to_blender"]
[texture_rules.match]
param_names = ["pm_normals", "pm normals", "normalmapa", "normalmapb"]
suffixes = []
[[texture_rules.connections]]
from = "image.Color"
to = "directx_normal_to_blender.Color"
[[texture_rules.connections]]
from = "directx_normal_to_blender.Normal"
to = "bsdf.Normal"

[[texture_rules]]
name = "orm"
prefer_suffix = true
[texture_rules.match]
param_names = ["blend_ao_r_m_mask", "blend ao r m mask"]
suffixes = ["blend_ao_r_m_mask"]
[texture_rules.nodes]
split = "ShaderNodeSeparateColor"
[[texture_rules.connections]]
from = "split.Red"
to = "ao_mix.Color2"
[[texture_rules.connections]]
from = "split.Green"
to = "bsdf.Roughness"
[[texture_rules.connections]]
from = "split.Blue"
to = "bsdf.Metallic"
[[texture_rules.connections]]
from = "image.Color"
to = "split.Color"

[[texture_rules]]
name = "rmo"
prefer_suffix = true
[texture_rules.match]
param_names = ["rmo", "pm_specularmasks", "pm specular masks", "ao roughness metallic height", "aoroughnessmetallicheight", "roughness metallic occlusion", "roughnessmetallicocclusion", "roughness metalness occlusion", "roughnessmetalnessocclusion"]
suffixes = ["rmo", "roughnessmetallicocclusion"]
[texture_rules.nodes]
split = "ShaderNodeSeparateColor"
displacement = "ShaderNodeDisplacement"
[[texture_rules.connections]]
from = "split.Red"
to = "ao_mix.Color2"
[[texture_rules.connections]]
from = "split.Green"
to = "bsdf.Roughness"
[[texture_rules.connections]]
from = "split.Blue"
to = "bsdf.Metallic"
[[texture_rules.connections]]
from = "image.Color"
to = "split.Color"
[[texture_rules.connections]]
from = "displacement.Displacement"
to = "output.Displacement"
[[texture_rules.connections]]
from = "image.Alpha"
to = "displacement.Height"

[[texture_rules]]
name = "mask1"
[texture_rules.match]
param_names = ["mask1"]
suffixes = ["mask1", "mask1_map", "body_mask1", "body_mask1_map", "hair_mask1", "hair_mask1_map", "face_mask1", "face_mask1_map"]
[texture_rules.skip_when]
NeedMask1 = false
[texture_rules.nodes]
split = "ShaderNodeSeparateColor"
[[texture_rules.connections]]
from = "image.Color"
to = "split.Color"
[[texture_rules.connections]]
from = "split.Green"
to = "bsdf.Roughness"
[[texture_rules.connections]]
from = "split.Blue"
to = "bsdf.Metallic"

[[texture_rules]]
name = "mask2"
[texture_rules.match]
param_names = ["mask2"]
suffixes = ["mask2", "mask2_map", "body_mask2", "body_mask2_map", "hair_mask2", "hair_mask2_map", "face_mask2", "face_mask2_map"]
[texture_rules.skip_when]
NeedMask2 = false
[texture_rules.nodes]
split = "ShaderNodeSeparateColor"
[[texture_rules.connections]]
from = "image.Color"
to = "split.Color"
[[texture_rules.connections]]
from = "split.Red"
to = "ao_mix.Color2"

[[texture_rules]]
name = "matcap"
node_groups = ["matcap_emission_strength"]
[texture_rules.match]
param_names = ["matcaptexture", "matcap texture", "materials1", "metallic2"]
suffixes = ["matcap", "matcap_toon", "materials1", "metallic2"]
[texture_rules.skip_when]
NeedMatCap = false
[texture_rules.nodes]
emission = "ShaderNodeEmission"
add_shader = "ShaderNodeAddShader"
[[texture_rules.connections]]
from = "image.Color"
to = "emission.Color"
[[texture_rules.connections]]
from = "image.Color"
to = "matcap_emission_strength.Color"
[[texture_rules.connections]]
from = "matcap_emission_strength.Value"
to = "bsdf.Emission Strength"
[[texture_rules.connections]]
from = "bsdf.BSDF"
to = "add_shader.Shader"
[[texture_rules.connections]]
from = "emission.Emission"
to = "add_shader.Shader_001"
[[texture_rules.connections]]
from = "add_shader.Shader"
to = "output.Surface"

[[texture_rules]]
name = "face_shadow"
[texture_rules.match]
param_names = ["faceshadowmask", "face shadow mask"]
suffixes = ["sdf"]
[texture_rules.nodes]
split = "ShaderNodeSeparateColor"
[[texture_rules.connections]]
from = "image.Color"
to = "split.Color"
[[texture_rules.connections]]
from = "split.Red"
to = "ao_mix.Color2"

[[texture_rules]]
name = "emotion_overlay"
node_groups = ["matcap_emission_strength"]
[texture_rules.match]
param_names = ["emotion_01", "emotion_02", "emotion_03", "emotion_04"]
suffixes = ["blush", "blush_2", "perspire", "tears"]
[texture_rules.nodes]
emission = "ShaderNodeEmission"
add_shader = "ShaderNodeAddShader"
[[texture_rules.connections]]
from = "image.Color"
to = "emission.Color"
[[texture_rules.connections]]
from = "image.Color"
to = "matcap_emission_strength.Color"
[[texture_rules.connections]]
from = "matcap_emission_strength.Value"
to = "bsdf.Emission Strength"
[[texture_rules.connections]]
from = "bsdf.BSDF"
to = "add_shader.Shader"
[[texture_rules.connections]]
from = "emission.Emission"
to = "add_shader.Shader_001"
[[texture_rules.connections]]
from = "add_shader.Shader"
to = "output.Surface"

[[texture_rules]]
name = "alpha_mask"
[texture_rules.match]
param_names = ["alphamaska_tex", "alphamaskb_tex", "dissolve map", "dissolvemap", "dissolve mask", "dissolvemask", "dissolve tex", "dissolvetex", "noise tex", "noise texture", "noisetex", "main tex uv noise tex", "maintexuvnoise_tex", "vertex noise", "t-noise_wall", "t-noise_wallmask", "maskrg", "edge highlight mask", "edgehighlightmask", "alpha mask a", "shazi"]
suffixes = ["m", "maska", "maskb"]
[texture_rules.nodes]
transparent = "ShaderNodeBsdfTransparent"
mix_shader = "ShaderNodeMixShader"
split = "ShaderNodeSeparateColor"
[[texture_rules.connections]]
from = "image.Color"
to = "split.Color"
[[texture_rules.connections]]
from = "split.Red"
to = "mix_shader.Fac"
[[texture_rules.connections]]
from = "transparent.BSDF"
to = "mix_shader.Shader"
[[texture_rules.connections]]
from = "bsdf.BSDF"
to = "mix_shader.Shader_001"
[[texture_rules.connections]]
from = "mix_shader.Shader"
to = "output.Surface"

[[texture_rules]]
name = "emissive"
prefer_suffix = true
[texture_rules.match]
param_names = ["led tex", "t_ledtex"]
suffixes = []
[texture_rules.nodes]
emission = "ShaderNodeEmission"
add_shader = "ShaderNodeAddShader"
[[texture_rules.connections]]
from = "image.Color"
to = "emission.Color"
[[texture_rules.connections]]
from = "bsdf.BSDF"
to = "add_shader.Shader"
[[texture_rules.connections]]
from = "emission.Emission"
to = "add_shader.Shader_001"
[[texture_rules.connections]]
from = "add_shader.Shader"
to = "output.Surface"
