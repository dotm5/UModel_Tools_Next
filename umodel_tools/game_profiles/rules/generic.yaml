name: Generic
description: Common Unreal material texture rules.

texture_rules:
  - name: diffuse
    diffuse: true
    match:
      param_names:
        - d
        - bc
        - base color
        - base color map
        - base colour
        - base colour map
        - basecolor
        - basecolour
        - diffuse
        - diffuse map
        - diffuse and alpha
        - diffuseandalpha
        - albedo
        - albedo map
      suffixes:
        - d
        - bc
        - basecolor
        - basecolour
        - diffuse
        - albedo
    connections:
      - from: image.Color
        to: ao_mix.Color1
      - from: image.Alpha
        to: bsdf.Alpha

  - name: normal
    match:
      param_names:
        - n
        - normal
        - normal map
        - normal texture
        - normalmap
        - tangent normal
        - tangentnormal
        - bump
        - bump map
      suffixes:
        - n
        - normal
        - normalmap
        - bump
    nodes:
      split: ShaderNodeSeparateColor
      invert_green: ShaderNodeInvert
      combine: ShaderNodeCombineColor
      normal_map: ShaderNodeNormalMap
    connections:
      - from: image.Color
        to: split.Color
      - from: split.Red
        to: combine.Red
      - from: split.Green
        to: invert_green.Color
      - from: invert_green.Color
        to: combine.Green
      - from: split.Blue
        to: combine.Blue
      - from: combine.Color
        to: normal_map.Color
      - from: normal_map.Normal
        to: bsdf.Normal

  - name: orm
    prefer_suffix: true
    match:
      param_names:
        - orm
        - occlusion roughness metallic
        - occlusionroughnessmetallic
        - occlusion roughness metalness
        - occlusionroughnessmetalness
        - ambient occlusion roughness metallic
        - ambientocclusionroughnessmetallic
        - ao_r_m_mask
        - ao r m mask
      suffixes:
        - orm
        - occlusionroughnessmetallic
        - ao_r_m_mask
    nodes:
      split: ShaderNodeSeparateColor
    connections:
      - from: split.Red
        to: ao_mix.Color2
      - from: split.Green
        to: bsdf.Roughness
      - from: split.Blue
        to: bsdf.Metallic
      - from: image.Color
        to: split.Color

  - name: mroh
    prefer_suffix: true
    match:
      param_names:
        - mroh
        - mroh/sroh
        - metallic roughness occlusion height
        - metallicroughnessocclusionheight
      suffixes:
        - mroh
        - sroh
    nodes:
      split: ShaderNodeSeparateColor
      displacement: ShaderNodeDisplacement
    connections:
      - from: split.Red
        to: bsdf.Metallic
      - from: split.Green
        to: bsdf.Roughness
      - from: split.Blue
        to: ao_mix.Color2
      - from: image.Color
        to: split.Color
      - from: displacement.Displacement
        to: output.Displacement
      - from: image.Alpha
        to: displacement.Height

  - name: mro
    prefer_suffix: true
    match:
      param_names:
        - mro
        - mro/sro
        - metallic roughness occlusion
        - metallicroughnessocclusion
      suffixes:
        - mro
        - mroa
    nodes:
      split: ShaderNodeSeparateColor
    connections:
      - from: split.Red
        to: bsdf.Metallic
      - from: split.Green
        to: bsdf.Roughness
      - from: split.Blue
        to: ao_mix.Color2
      - from: image.Color
        to: split.Color

  - name: rm
    prefer_suffix: true
    match:
      param_names:
        - rm
        - roughness metallic
        - roughnessmetallic
      suffixes:
        - rm
    nodes:
      split: ShaderNodeSeparateColor
    connections:
      - from: split.Red
        to: bsdf.Roughness
      - from: split.Green
        to: bsdf.Metallic
      - from: image.Color
        to: split.Color

  - name: sro
    prefer_suffix: true
    match:
      param_names:
        - sro
        - specular roughness occlusion
        - specularroughnessocclusion
      suffixes:
        - sro
    nodes:
      split: ShaderNodeSeparateColor
    connections:
      - from: split.Red
        to: bsdf.Specular
      - from: split.Green
        to: bsdf.Roughness
      - from: split.Blue
        to: ao_mix.Color2
      - from: image.Color
        to: split.Color

  - name: ao
    prefer_suffix: true
    match:
      param_names:
        - ao
        - ambient occlusion
        - ambientocclusion
        - occlusion
        - occlusion map
      suffixes:
        - ao
        - occlusion
    connections:
      - from: image.Color
        to: ao_mix.Color2

  - name: roughness
    prefer_suffix: true
    match:
      param_names:
        - roughness
        - roughness map
        - roughness texture
      suffixes:
        - rough
        - roughness
    connections:
      - from: image.Color
        to: bsdf.Roughness

  - name: metallic
    prefer_suffix: true
    match:
      param_names:
        - metallic
        - metallic map
        - metallic texture
        - metalness
        - metalness map
      suffixes:
        - metal
        - metallic
        - metalness
    connections:
      - from: image.Color
        to: bsdf.Metallic

  - name: specular
    prefer_suffix: true
    match:
      param_names:
        - specular
        - specular map
        - specularity
      suffixes:
        - specular
        - spec
    connections:
      - from: image.Color
        to: bsdf.Specular

  - name: alpha_mask
    match:
      param_names:
        - alpha mask
        - alpha mask texture
        - alpha map
        - alpha
        - alpha texture
        - alpha tex
        - mask
        - mask map
        - opacity
        - opacity mask
        - opacity mask texture
        - cutout
        - transparency
        - transparent
      suffixes:
        - mask
        - alphamask
        - opacity
        - opacitymask
        - cutout
        - transparency
    nodes:
      transparent: ShaderNodeBsdfTransparent
      mix_shader: ShaderNodeMixShader
      split: ShaderNodeSeparateColor
    connections:
      - from: image.Color
        to: split.Color
      - from: split.Red
        to: mix_shader.Fac
      - from: transparent.BSDF
        to: mix_shader.Shader
      - from: bsdf.BSDF
        to: mix_shader.Shader_001
      - from: mix_shader.Shader
        to: output.Surface

  - name: glass
    prefer_suffix: true
    match:
      param_names:
        - glass
        - glass map
        - window
        - window glass
        - refraction
        - lens
      suffixes:
        - glass
        - window
        - lens
        - refraction
    nodes:
      glass: ShaderNodeBsdfGlass
    connections:
      - from: image.Color
        to: glass.Color
      - from: glass.BSDF
        to: output.Surface

  - name: translucent
    prefer_suffix: true
    match:
      param_names:
        - translucent
        - translucent map
        - translucency
        - thin
      suffixes:
        - translucent
        - translucency
    nodes:
      translucent: ShaderNodeBsdfTranslucent
    connections:
      - from: image.Color
        to: translucent.Color
      - from: translucent.BSDF
        to: output.Surface

  - name: emissive
    prefer_suffix: true
    match:
      param_names:
        - emissive
        - emissive map
        - emission
        - emission map
        - glow
        - self illumination
        - self illuminated
      suffixes:
        - emissive
        - emission
        - glow
    nodes:
      emission: ShaderNodeEmission
      add_shader: ShaderNodeAddShader
    connections:
      - from: image.Color
        to: emission.Color
      - from: bsdf.BSDF
        to: add_shader.Shader
      - from: emission.Emission
        to: add_shader.Shader_001
      - from: add_shader.Shader
        to: output.Surface
